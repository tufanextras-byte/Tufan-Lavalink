server:
  port: ${PORT:10000}
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: true
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
    bufferDurationMs: 600 # Increased for free tier stability
    frameBufferDurationMs: 5000
    opusEncodingQuality: 0 # Save CPU
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    scSearchExpirationStep: 600000

logging:
  level:
    root: INFO
    lavalink: INFO
